services:
  # ── PostgreSQL + pgvector — Persistence & vector store ────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: risk-postgres
    # Host port: set POSTGRES_PORT_PUBLISH in .env if the default is taken (e.g. 15432, 5434).
    ports:
      - "${POSTGRES_PORT_PUBLISH:-15432}:5432"
    environment:
      POSTGRES_DB: riskanalysis
      POSTGRES_USER: risk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riskpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U risk -d riskanalysis" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis — LangGraph state checkpointing ────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: risk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Risk Analysis Backend API ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risk-api
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://risk:${POSTGRES_PASSWORD:-riskpass}@postgres:5432/riskanalysis
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5}
      - PYTHONPATH=/app
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    restart: unless-stopped

  # ── Langfuse — LLM Observability & Tracing ───────────────────────
  langfuse:
    image: langfuse/langfuse:2
    container_name: risk-langfuse
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://risk:${POSTGRES_PASSWORD:-riskpass}@postgres:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-supersecret-change-in-prod}
      - SALT=${LANGFUSE_SALT:-salt-change-in-prod}
      - NEXTAUTH_URL=http://localhost:3001
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
      - NEXT_PUBLIC_SIGN_UP_DISABLED=false
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
