services:
  # ── Redis — Fault-tolerant state management & checkpointing ───────
  redis:
    image: redis/redis-stack-server:latest
    container_name: risk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Risk Analysis Application ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risk-analysis
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5}
      - PYTHONPATH=/app
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    stdin_open: true
    tty: true
    restart: "no"

volumes:
  redis_data:
    driver: local
